
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>S.O. Consulting Global Platform</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<h1 style="padding:20px">Global Cement Intelligence Platform</h1>

<div id="map"></div>

<script>
fetch('data/plants.json').then(r=>r.json()).then(data=>{

var map=L.map('map').setView([20,0],2)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

data.slice(0,3000).forEach(p=>{
L.circleMarker([p.lat,p.lon],{radius:2}).addTo(map)
})

})
</script>

</body>
</html>
